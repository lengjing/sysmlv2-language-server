<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysML v2 Web Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
        header { background: #252526; padding: 8px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #3c3c3c; }
        header h1 { font-size: 14px; font-weight: 500; color: #cccccc; }
        header .status { font-size: 12px; color: #6a9955; margin-left: auto; }
        .toolbar { background: #2d2d2d; padding: 4px 16px; display: flex; gap: 8px; border-bottom: 1px solid #3c3c3c; }
        .toolbar button { background: #0e639c; color: white; border: none; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .toolbar button:hover { background: #1177bb; }
        #editor-container { flex: 1; }
        footer { background: #007acc; padding: 2px 16px; font-size: 12px; display: flex; gap: 16px; }
        footer span { color: white; }
    </style>
</head>
<body>
    <header>
        <h1>SysML v2 Web Editor</h1>
        <span class="status" id="status">● Ready</span>
    </header>
    <div class="toolbar">
        <button id="btn-validate">Validate</button>
        <button id="btn-format">Format</button>
        <button id="btn-clear">Clear</button>
    </div>
    <div id="editor-container"></div>
    <footer>
        <span>SysML v2</span>
        <span id="cursor-pos">Ln 1, Col 1</span>
    </footer>

    <script type="module">
        // In production, this would import from the built bundle
        console.log('[SysML WebApp] Loading...');
        
        document.getElementById('btn-clear').addEventListener('click', () => {
            console.log('[SysML WebApp] Clear requested');
        });
        
        document.getElementById('btn-validate').addEventListener('click', () => {
            console.log('[SysML WebApp] Validate requested');
        });
        
        document.getElementById('btn-format').addEventListener('click', () => {
            console.log('[SysML WebApp] Format requested');
        });
    </script>
</body>
</html>
